<main class="login">
  <div class="login__wrap">
    <div class="brand">
      <div class="brand__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path
            d="M7 14l3-3 3 3 4-4"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </div>
      <div class="brand__name">FFB</div>
      <div class="brand__tag">Controle financeiro simples, seguro e organizado.</div>
    </div>

    <section class="card" aria-label="Acesso ao sistema">
      <div class="mode" role="tablist" aria-label="Modo de acesso">
        <button type="button" [class.mode__btn--active]="!isRegisterMode()" class="mode__btn" (click)="isRegisterMode.set(false)">
          Entrar
        </button>
        <button type="button" [class.mode__btn--active]="isRegisterMode()" class="mode__btn" (click)="isRegisterMode.set(true)">
          Criar conta
        </button>
      </div>

      <form class="form" [formGroup]="form" (ngSubmit)="submit()">
        <label class="field">
          <div class="field__label">E-mail</div>
          <input
            class="field__input"
            type="email"
            inputmode="email"
            autocomplete="username"
            placeholder="seu@email.com"
            formControlName="email"
            aria-describedby="email-help"
          />
          <span id="email-help" class="field__hint">Use o e-mail cadastrado na sua conta.</span>
        </label>

        <label class="field">
          <div class="field__label">Senha</div>
          <input
            class="field__input"
            type="password"
            autocomplete="current-password"
            placeholder="Mínimo de 6 caracteres"
            formControlName="senha"
          />
        </label>

        @if (errorMessage()) {
          <div class="error" role="alert">{{ errorMessage() }}</div>
        }

        @if (successMessage()) {
          <div class="success" role="status">{{ successMessage() }}</div>
        }

        <button class="btn" type="submit" [disabled]="isSubmitting()">
          <span>{{ isSubmitting() ? 'Aguarde...' : (isRegisterMode() ? 'Criar conta' : 'Entrar') }}</span>
          <span class="btn__arrow" aria-hidden="true">→</span>
        </button>

        <button class="link-btn" type="button" (click)="toggleMode()">
          {{ isRegisterMode() ? 'Já tenho conta' : 'Ainda não tenho conta' }}
        </button>
      </form>
    </section>
  </div>
</main>
