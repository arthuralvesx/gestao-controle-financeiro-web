<section class="page" aria-label="Receita">
  <div class="hero">
    <div class="hero__icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="1" x2="12" y2="23" />
        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
      </svg>
    </div>
    <h1 class="hero__title">Sua renda mensal</h1>
    <p class="hero__sub">Gerencie sua receita com clareza.</p>
  </div>

  @if (!showForm()) {
    <div class="card">
      <span class="card__label">Receita atual</span>
      <p class="card__value">{{ formatBrl(totalAtual()) }}</p>
      <button class="btn-primary" (click)="openForm()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z" />
        </svg>
        Editar receita
      </button>
    </div>
  }

  @if (showForm()) {
    <div class="card card--form">
      <label class="form__label" for="v">Valor da receita mensal (R$)</label>
      <div class="form__row">
        <input
          id="v"
          class="form__input"
          type="text"
          inputmode="numeric"
          placeholder="R$ 0,00"
          appBrlCurrency
          [(ngModel)]="editValor"
          [attr.aria-invalid]="valorError ? 'true' : null"
        />
      </div>
      @if (valorError) {
        <div class="field-error" role="alert">{{ valorError }}</div>
      }
      <div class="form__btns">
        <button class="btn-primary btn-primary--flex" (click)="save()" [disabled]="saving() || !editValor || editValor <= 0">
          {{ saving() ? 'Salvando…' : 'Salvar' }}
        </button>
        <button class="btn-ghost" (click)="showForm.set(false)">Cancelar</button>
      </div>
    </div>
  }
</section>
